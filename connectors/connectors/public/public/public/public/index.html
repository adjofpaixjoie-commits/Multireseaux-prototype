<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Publication multi-reseaux — Prototype</title>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#2563eb" />
<link rel="apple-touch-icon" href="/icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<style>
  body { font-family: system-ui, sans-serif; max-width: 520px; margin: 40px auto; padding: 0 16px; }
  h1 { font-size: 1.3rem; }
  label { display: block; margin-top: 16px; font-weight: 600; }
  input[type="file"], textarea { width: 100%; margin-top: 6px; padding: 8px; box-sizing: border-box; }
  .platforms { display: flex; gap: 16px; margin-top: 6px; }
  button { margin-top: 20px; padding: 10px 18px; cursor: pointer; }
  #estimate, #results { margin-top: 16px; padding: 12px; background: #f4f4f4; border-radius: 6px; font-size: 0.9rem; white-space: pre-wrap; }
</style>
</head>
<body>
  <h1>Publier sur plusieurs reseaux</h1>
  <button id="installBtn" style="display:none; background:#2563eb; color:white; border:none; border-radius:6px;">📲 Installer l'app sur l'ecran d'accueil</button>

  <label>Fichier</label>
  <input type="file" id="file" />

  <label>Legende</label>
  <textarea id="caption" rows="3" placeholder="Texte du post..."></textarea>

  <label>Plateformes</label>
  <div class="platforms">
    <label><input type="checkbox" value="telegram" checked /> Telegram</label>
    <label><input type="checkbox" value="x" /> X</label>
  </div>

  <div id="estimate"></div>

  <button id="publishBtn">Publier</button>

  <div id="results"></div>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/service-worker.js").catch(() => {});
  });
}

let deferredInstallPrompt = null;
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  const btn = document.getElementById("installBtn");
  if (btn) btn.style.display = "inline-block";
});

document.addEventListener("DOMContentLoaded", () => {
  const installBtn = document.getElementById("installBtn");
  if (installBtn) {
    installBtn.addEventListener("click", async () => {
      if (!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      await deferredInstallPrompt.userChoice;
      deferredInstallPrompt = null;
      installBtn.style.display = "none";
    });
  }
});

const captionEl = document.getElementById("caption");
const estimateEl = document.getElementById("estimate");
const resultsEl = document.getElementById("results");

function getSelectedPlatforms() {
  return [...document.querySelectorAll(".platforms input:checked")].map(cb => cb.value);
}

async function updateEstimate() {
  const platforms = getSelectedPlatforms();
  if (platforms.length === 0) { estimateEl.textContent = ""; return; }
  const res = await fetch("/api/estimate", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ platforms, caption: captionEl.value }),
  });
  const data = await res.json();
  estimateEl.textContent = "Cout estime : " + data.estimate.map(e => `${e.platform}: $${e.cost.toFixed(3)}`).join(" | ") + ` — Total: $${data.total.toFixed(3)}`;
}

captionEl.addEventListener("input", updateEstimate);
document.querySelectorAll(".platforms input").forEach(cb => cb.addEventListener("change", updateEstimate));
updateEstimate();

document.getElementById("publishBtn").addEventListener("click", async () => {
  const fileInput = document.getElementById("file");
  if (!fileInput.files[0]) { alert("Choisissez un fichier"); return; }

  const formData = new FormData();
  formData.append("file", fileInput.files[0]);
  formData.append("caption", captionEl.value);
  getSelectedPlatforms().forEach(p => formData.append("platforms", p));

  resultsEl.textContent = "Publication en cours...";
  const res = await fetch("/api/publish", { method: "POST", body: formData });
  const data = await res.json();
  resultsEl.textContent = JSON.stringify(data, null, 2);
});
</script>
</body>
</html>
